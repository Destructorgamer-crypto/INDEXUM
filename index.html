        function toggleFav(n, e) { e.stopPropagation(); favorites.includes(n) ? favorites = favorites.filter(f => f !== n) : favorites.push(n); localStorage.setItem('ix_favs', JSON.stringify(favorites)); loadMenu(document.getElementById('ix-search').value); }
        function initFooter() { setInterval(() => { document.getElementById('footer-center').innerText = new Date().toLocaleTimeString(); }, 1000); }
        function initMatrix() {
            const c = document.getElementById('bin-canvas'); const ctx = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const drops = Array(Math.floor(c.width / 20)).fill(1);
            ctx.font = "14px Courier New";
            setInterval(() => {
                ctx.fillStyle = document.body.classList.contains('light-mode') ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.05)"; 
                ctx.fillRect(0,0,c.width,c.height);
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--matrix-color');
                drops.forEach((y, i) => {
                    ctx.fillText(Math.floor(Math.random()*2), i*20, y*14);
                    if(y*14 > c.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
                });
            }, 33);
        }
    </script>
</body>
</html>
